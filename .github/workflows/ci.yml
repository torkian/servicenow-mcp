name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --select E,F --ignore E501

      - name: Ruff format check
        run: ruff format --check .
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_catalog_resources.py \
            --ignore=tests/test_changeset_resources.py \
            --ignore=tests/test_script_include_resources.py \
            --ignore=tests/test_workflow_tools_direct.py \
            --ignore=tests/test_server_catalog.py \
            --ignore=tests/test_server_workflow.py \
            --cov=servicenow_mcp \
            --cov-report=xml \
            --cov-report=term-missing \
            -q \
            -x --tb=short \
            -k "not test_create_change_request_with_swapped_parameters and not test_create_article_params and not test_add_workflow_activity_success"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: pip-audit
